name: Task Validation

on:
  push:
    branches-ignore:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Show Structure (Debug)
        run: ls -R

      - name: Compile Source
        run: |
          mkdir -p out
          find tasks/task-01/starter/src -name "*.java" > sources.txt
          javac -cp "libs/*" -d out @sources.txt
      - name: Compile Tests
        run: |
          find tasks/task-01/tests -name "*.java" > tests.txt
          javac -cp "libs/*:out" -d out @tests.txt

      - name: Run Tests
        run: |
          java -cp "libs/*:out" org.junit.runner.JUnitCore Task01Test