name: Task Validation

on:
  push:
    branches-ignore:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Compile Source
        run: |
          mkdir -p out
          find src -name "*.java" > sources.txt
          javac -cp "libs/*" -d out @sources.txt

      - name: Compile Tests
        run: |
          find tests -name "*.java" > tests.txt
          javac -cp "libs/*:out" -d out @tests.txt

      - name: Run Tests
        run: |
          java -cp "libs/*:out" org.junit.runner.JUnitCore Task01Test